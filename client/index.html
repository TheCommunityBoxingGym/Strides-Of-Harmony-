    <!-- JSON-LD Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What if I have never Nordic walked before?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely no experience is needed. Every session begins with a full technique introduction using the INWA 10-Step Method. Our qualified instructors will guide you through everything from the very beginning. You will be walking with confidence within minutes."
          }
        },
        {
          "@type": "Question",
          "name": "What should I wear to a Nordic Walking session?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can come in absolutely anything you feel comfortable in. There is no dress code, no special kit required, and no judgement. Whether that is jeans and a hoodie, a tracksuit, or full walking gear, if you are comfortable, you are dressed right. The only thing we recommend is comfortable footwear with a good grip, such as trainers or walking shoes."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to buy Nordic Walking poles?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. We provide all poles free of charge at every session. You do not need to purchase or bring any equipment. Just show up."
          }
        },
        {
          "@type": "Question",
          "name": "Are there age restrictions for Strides of Harmony?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Strides of Harmony is designed for adults aged 18 and over. Nordic Walking is a low-impact activity suitable for a wide range of fitness levels, ages, and physical conditions. If you have any specific health concerns, we recommend speaking with your GP beforehand, but we welcome participants of all ages and abilities."
          }
        },
        {
          "@type": "Question",
          "name": "Is Strides of Harmony only for people in recovery?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "While Strides of Harmony is specifically designed with the recovery community in mind, it is also open to anyone facing barriers to traditional fitness whether physical, emotional, social, or financial. Everyone is welcome. The only requirement is a willingness to show up."
          }
        },
        {
          "@type": "Question",
          "name": "Is it really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Completely free. Every session, every week. There are no hidden costs, no membership fees, and no commitment required. Strides of Harmony is funded to be accessible to everyone, regardless of financial circumstances. This is thanks to Turning Point and their 60 year ongoing commitment to helping humanity break free from addictions and substance use disorder."
          }
        },
        {
          "@type": "Question",
          "name": "Where is the session held in Leicester?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sessions are held every Saturday from 2pm to 3pm at Victoria Park, Leicester. Meet at the Sikh soldier statue opposite De Montfort Hall car park."
          }
        }
      ]
    }
    </script>
